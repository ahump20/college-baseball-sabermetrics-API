name: 🔒 Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      
      - name: Custom Pattern Check
        run: |
          echo "🔍 Running custom secret pattern checks..."
          
          # Check for .env files (except .env.example)
          if git ls-files | grep -E "^\.env(\.|$)" | grep -v "\.env\.example"; then
            echo "❌ ERROR: .env file(s) found in repository!"
            exit 1
          fi
          
          # Check for common API key patterns
          if git grep -iE "(api[_-]?key|apikey|api_secret).*=.*[A-Za-z0-9]{20,}" -- ':(exclude).env.example' ':(exclude)*.md'; then
            echo "❌ ERROR: Potential API keys found in source!"
            exit 1
          fi
          
          # Check for Cloudflare tokens
          if git grep -E "[A-Za-z0-9_\-]{40}" -- ':(exclude).env.example' ':(exclude)*.md' | grep -i cloudflare; then
            echo "⚠️  WARNING: Potential Cloudflare token found"
          fi
          
          # Check for Stripe keys
          if git grep -E "(sk|pk)_(test|live)_[A-Za-z0-9]{24,}"; then
            echo "❌ ERROR: Stripe API key found!"
            exit 1
          fi
          
          # Check for private keys
          if git grep -i "BEGIN.*PRIVATE KEY"; then
            echo "❌ ERROR: Private key found in repository!"
            exit 1
          fi
          
          echo "✅ Custom pattern checks passed"
      
      - name: Check for hardcoded credentials in code
        run: |
          echo "🔍 Scanning for hardcoded credentials..."
          
          # Check TypeScript/JavaScript files
          FILES=$(git ls-files '*.ts' '*.tsx' '*.js' '*.jsx' | grep -v node_modules || true)
          
          if [ -n "$FILES" ]; then
            for file in $FILES; do
              # Check for hardcoded tokens
              if grep -P "token\s*=\s*['\"][^'\"]{20,}" "$file" | grep -v "//"; then
                echo "⚠️  Potential hardcoded token in $file"
              fi
              
              # Check for URLs with credentials
              if grep -P "(https?|ftp)://[^:]+:[^@]+@" "$file"; then
                echo "❌ ERROR: URL with embedded credentials in $file"
                exit 1
              fi
            done
          fi
          
          echo "✅ Hardcoded credential check passed"
      
      - name: Verify .gitignore is protecting secrets
        run: |
          echo "🔍 Verifying .gitignore configuration..."
          
          # Check that critical patterns are in .gitignore
          REQUIRED_PATTERNS=(
            "\.env$"
            "\.env\.\*"
            "\*\.secret"
            "\*\.pem"
            "\*\.key"
          )
          
          for pattern in "${REQUIRED_PATTERNS[@]}"; do
            if ! grep -q "$pattern" .gitignore; then
              echo "❌ ERROR: Missing .gitignore pattern: $pattern"
              exit 1
            fi
          done
          
          echo "✅ .gitignore properly configured"
      
      - name: Report results
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ All secret scanning checks passed!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ Secret scanning detected issues"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
